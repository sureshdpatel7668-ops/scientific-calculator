<!DOCTYPE html>
<html lang="en">
<head>
    <title>calculator</title>
    <link rel="stylesheet" href="cal.css">
</head>
<body>
    <div id ="calculator">
        <input type="text" id="display" readonly>
    <div class="line-me">

        <button class = "main-button" onclick=";
        currentdisplay=Math.sin(Math.PI * currentdisplay / 180);
        document.querySelector('#display').value=currentdisplay;
        ">sin</button>

        <button class = "main-button" onclick=";
        currentdisplay=Math.log10(currentdisplay)*2.303;
        document.querySelector('#display').value=currentdisplay;
        ">ln</button>

        <button class = "main-button" onclick="
        currentdisplay+='1';
        document.querySelector('#display').value=currentdisplay;
        ">1</button>
        <button class = "main-button" onclick="
        currentdisplay+='2';
        document.querySelector('#display').value=currentdisplay;
        ">2</button>
        <button class = "main-button" onclick="
        currentdisplay+='3';
        document.querySelector('#display').value=currentdisplay;
        ">3</button>
    </div>

    <div class="line-me">

        <button class = "main-button" onclick=";
        currentdisplay=Math.cos(Math.PI * currentdisplay / 180);
        document.querySelector('#display').value=currentdisplay;
        ">cos</button>

        <button class = "main-button" onclick=";
        currentdisplay=Math.log10(currentdisplay);
        document.querySelector('#display').value=currentdisplay;
        ">Log</button>
        <button class = "main-button" onclick="
        currentdisplay+='4';
        document.querySelector('#display').value=currentdisplay;
        ">4</button>
        <button class = "main-button" onclick="
        currentdisplay+='5';
        document.querySelector('#display').value=currentdisplay;
        ">5</button>
        <button class = "main-button" onclick="
        currentdisplay+='6';
        document.querySelector('#display').value=currentdisplay;
        ">6</button>
    </div>

    <div class="line-me">

        <button class = "main-button" onclick=";
        currentdisplay=Math.tan(Math.PI * currentdisplay / 180);
        document.querySelector('#display').value=currentdisplay;
        ">tan</button>

        <button class = "main-button" onclick="
        currentdisplay=Math.exp(currentdisplay);
        document.querySelector('#display').value=currentdisplay;
        ">exp</button>
        <button class = "main-button"
        onclick="
        currentdisplay+='7';
        document.querySelector('#display').value=currentdisplay;
        ">7</button>
        <button class = "main-button" onclick="
        currentdisplay+='8';
        document.querySelector('#display').value=currentdisplay;
        ">8</button>
        <button class = "main-button" onclick="
        currentdisplay+='9';
        document.querySelector('#display').value=currentdisplay;
        ">9</button>
    </div>

    <div class="line-me">

        <button class = "main-button" onclick=";
        currentdisplay+='(';
        document.querySelector('#display').value=currentdisplay;
        ">(</button>

        <button class = "main-button" onclick="
        currentdisplay+='*';
        document.querySelector('#display').value=currentdisplay;
        ">*</button>
        <button class = "main-button" onclick="
        currentdisplay+='/';
        document.querySelector('#display').value=currentdisplay;
        ">/</button>

        <button class = "main-button" onclick="
        currentdisplay+='0';
        document.querySelector('#display').value=currentdisplay;
        ">0</button>
        
         
        <button class = "main-button" onclick="
        firstdisplay= currentdisplay;
        currentdisplay = `${firstdisplay} = ${eval(currentdisplay)}`;
        document.querySelector('#display').value=currentdisplay;
        ">=</button>
    </div>

    <div class="line-me">

        <button class = "main-button" onclick=";
        currentdisplay+=')';
        document.querySelector('#display').value=currentdisplay;
        ">)</button>
        <button class = "main-button" onclick="
        currentdisplay+='.';
        document.querySelector('#display').value=currentdisplay;
        ">.</button>
        <button class = "main-button"
        onclick="
        currentdisplay+='**';
        document.querySelector('#display').value=currentdisplay;
        ">^</button>
        <button class = "main-button" onclick="
        currentdisplay+='+';
        document.querySelector('#display').value=currentdisplay;
        ">+</button>
        <button class = "main-button" onclick="
        currentdisplay+='-';
        document.querySelector('#display').value=currentdisplay;
        ">-</button>
         
    </div>
    <div class="line-me">
        <button class = "main-button-data" onclick="
        currentdisplay='';
        document.querySelector('#display').value=currentdisplay;
        ">Clear</button>
        
        <button class = "main-button-data" onclick="
        currentdisplay = currentdisplay.slice(0, -1);
        document.querySelector('#display').value=currentdisplay;
        ">Delete</button> 
    </div>
    <script>
        let firstdisplay='';
        let currentdisplay='';
        document.querySelector('#display').value=currentdisplay;

    </script>
</body>
</html>
